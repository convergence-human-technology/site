<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espace Membres - Convergence</title>
  <script src="https://unpkg.com/@auth0/auth0-spa-js@2.1.3/dist/auth0-spa-js.production.js"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; text-align: center; }
    #user-card { background: #f4f4f4; border-radius: 10px; padding: 30px; margin: 20px auto; }
    img.avatar { border-radius: 50%; width: 80px; }
    button { padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
  </style>
</head>
<body>
  <h1>👥 Espace Membres</h1>
  <div id="user-card">Chargement...</div>
  <button id="btn-logout">🚪 Déconnexion</button>

  <script>
    (async () => {
      const auth0 = await createAuth0Client({
        domain: "convergence-tech.eu.auth0.com",
        clientId: "0NtxpyovHGewr14669n3Qz8RJYot27AS",
        authorizationParams: {
          redirect_uri: "https://convergence-human-technology.github.io/site/callback.html"
        }
      });

      const isAuthenticated = await auth0.isAuthenticated();
      if (!isAuthenticated) {
        window.location.replace("https://convergence-human-technology.github.io/site/index.html");
        return;
      }

      const user = await auth0.getUser();
      document.getElementById("user-card").innerHTML = `
        <img class="avatar" src="${user.picture}" alt="Avatar">
        <h2>Bonjour, <strong>${user.name}</strong> ! 👋</h2>
        <p>📧 ${user.email}</p>
        <p>✅ Vous êtes bien connecté à l'espace membres.</p>
      `;

      document.getElementById("btn-logout").onclick = () => {
        auth0.logout({ logoutParams: {
          returnTo: "https://convergence-human-technology.github.io/site/index.html"
        }});
      };
    })();
  </script>
</body>
</html>
