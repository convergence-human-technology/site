<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion en cours...</title>
</head>
<body>
  <p>Connexion en cours... ⏳</p>
  <script>
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const token = params.get("access_token");

    if (token) {
      sessionStorage.setItem("auth_token", token);
      window.location.replace("https://convergence-human-technology.github.io/site/membres.html");
    } else {
      window.location.replace("https://convergence-human-technology.github.io/site/index.html");
    }
  </script>
</body>
</html>
